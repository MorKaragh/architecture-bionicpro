worker_processes auto;
# В Docker логи контейнера собирают stdout/stderr; файлы под /var/log/nginx в логах compose не видны.
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format cache_debug '$remote_addr "$request" $status '
        'upstream_cache=$upstream_cache_status '
        'upstream_status=$upstream_status '
        'uri="$request_uri" '
        'ae="$http_accept_encoding"';

    proxy_cache_path /var/cache/nginx/report_cache
        levels=1:2
        keys_zone=report_cache:20m
        max_size=512m
        inactive=120m
        use_temp_path=off;

    server {
        listen 8090;
        server_name _;
        # flush для stdout Docker задаётся только вместе с buffer (иначе nginx не стартует).
        access_log /dev/stdout cache_debug buffer=64k flush=1s;

        # Эмуляция CDN: reverse proxy на MinIO + кеш объектов отчётов.
        # Ключ объекта в S3 включает user_key и data_as_of — при новом ETL новый URL,
        # старый кеш перестаёт использоваться; дополнительно действует TTL зоны proxy_cache.
        # Не используем `if` в этом location: в nginx сочетание if + proxy_cache часто даёт
        # повторные MISS на одном и том же URI (кеш фактически не заполняется для GET).
        # CORS к :8090 для текущего UI не нужен (браузер ходит на BFF :8000).
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location /reports-cache/ {
            set $minio_upstream http://minio:9000;
            proxy_pass $minio_upstream/bionicpro-reports/;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header Connection "";

            proxy_ignore_headers Vary;

            proxy_cache report_cache;
            proxy_cache_valid 200 24h;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_key "$scheme$proxy_host$request_uri";
            add_header X-Cache-Status $upstream_cache_status always;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Expose-Headers "X-Cache-Status, Cache-Control, Content-Length, Content-Type, ETag, Last-Modified" always;
            add_header Access-Control-Allow-Private-Network "true" always;

            proxy_pass_header Cache-Control;
        }
    }
}
