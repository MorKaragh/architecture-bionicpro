worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    proxy_cache_path /var/cache/nginx/report_cache
        levels=1:2
        keys_zone=report_cache:20m
        max_size=512m
        inactive=120m
        use_temp_path=off;

    upstream minio_s3 {
        server minio:9000;
        keepalive 32;
    }

    server {
        listen 8090;
        server_name _;

        # Эмуляция CDN: reverse proxy на MinIO + кеш объектов отчётов.
        # Ключ объекта в S3 включает user_key и data_as_of — при новом ETL новый URL,
        # старый кеш перестаёт использоваться; дополнительно действует TTL зоны proxy_cache.
        location /reports-cache/ {
            # Preflight: фронт на другом порту (localhost:3000 → localhost:8090) —
            # нужны CORS и для Chrome — Private Network Access (Allow-Private-Network).
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Accept, Authorization, Content-Type, Range, X-Requested-With" always;
                add_header Access-Control-Allow-Private-Network "true" always;
                add_header Access-Control-Max-Age "86400" always;
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://minio_s3/bionicpro-reports/;
            proxy_http_version 1.1;
            proxy_set_header Host minio:9000;
            proxy_set_header Connection "";

            proxy_cache report_cache;
            proxy_cache_valid 200 24h;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_key "$scheme$proxy_host$request_uri";
            add_header X-Cache-Status $upstream_cache_status always;

            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Expose-Headers "X-Cache-Status, Cache-Control, Content-Length, Content-Type, ETag, Last-Modified" always;
            add_header Access-Control-Allow-Private-Network "true" always;

            proxy_pass_header Cache-Control;
        }
    }
}
